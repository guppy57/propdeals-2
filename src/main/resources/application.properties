spring.application.name=propdeals
server.port=${PORT:8080}

# Supabase — token validation is delegated to the Auth server (GET /auth/v1/user)
# so no JWT secret is needed here.
# SUPABASE_URL: e.g. https://yourproject.supabase.co
# SUPABASE_API_KEY: the publishable (anon) key from Project Settings → API
supabase.url=${SUPABASE_URL}
supabase.api-key=${SUPABASE_API_KEY}

# CORS — comma-separated list of allowed frontend origins
# e.g. http://localhost:5173,https://your-app.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Spring JDBC
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.taypkqqcgjqnyserkwgy
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.security=DEBUG

# Disable Hibernate auto DDL — let Flyway manage the schema
spring.jpa.hibernate.ddl-auto=validate